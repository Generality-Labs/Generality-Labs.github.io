name: Update RLI leaderboard data

# Weekly scrape of the Scale RLI leaderboard. New models are appended to the
# post's rli.json (dated at appearance) and show up as out-of-sample stars on
# the "putting it all together" graph. The frozen forecast is unaffected.
on:
  schedule:
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scrape leaderboard and update rli.json
        run: python3 scripts/update_rli.py
      - name: Commit if changed
        run: |
          if git diff --quiet -- '**/rli.json'; then
            echo "No new models; nothing to commit."
          else
            git config user.name "rli-bot"
            git config user.email "actions@users.noreply.github.com"
            git add '**/rli.json'
            git commit -m "Auto-update RLI leaderboard data ($(date -u +%Y-%m-%d))"
            git push
          fi
